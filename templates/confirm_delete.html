{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-danger shadow">
            <div class="card-body text-center p-5">
                <i class="bi bi-exclamation-triangle text-danger h1"></i>
                <h3 class="mt-3">¿Estás seguro?</h3>
                <p class="text-muted">Estás a punto de eliminar este registro de <strong>VitalCare</strong>. Esta acción
                    no se puede deshacer.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger fw-bold">Sí, Eliminar permanentemente</button>
                        <a href="javascript:history.back()" class="btn btn-light">No, Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

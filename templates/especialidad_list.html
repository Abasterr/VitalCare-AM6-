{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Especialidades</h2>
    <a href="{% url 'especialidad_create' %}" class="btn btn-primary">Nueva Especialidad</a>
</div>
<div class="row">
    {% for esp in especialidades %}
    <div class="col-md-4 mb-3">
        <div class="card shadow-sm p-3 d-flex flex-row justify-content-between align-items-center">
            <strong>{{ esp.nombre }}</strong>
            <div>
                <a href="{% url 'especialidad_update' esp.pk %}" class="text-info me-2"><i class="bi bi-pencil"></i></a>
                <a href="{% url 'especialidad_delete' esp.pk %}" class="text-danger"><i class="bi bi-trash"></i></a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary"><i class="fa-solid fa-stethoscope"></i> Especialidades Médicas</h2>
    <a href="{% url 'especialidad_create' %}" class="btn btn-primary">
        <i class="fa-solid fa-plus"></i> Nueva Especialidad
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">Nombre de la Especialidad</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for especialidad in especialidades %}
                <tr>
                    <td class="ps-4 fw-medium">{{ especialidad.nombre }}</td>
                    <td class="text-center">
                        <a href="{% url 'especialidad_update' especialidad.pk %}" class="btn btn-primary btn-sm me-1">
                            <i class="fa-solid fa-pen-to-square"></i> Editar
                        </a>
                        <a href="{% url 'especialidad_delete' especialidad.pk %}" class="btn btn-danger btn-sm">
                            <i class="fa-solid fa-trash-can"></i> Borrar
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center py-4 text-muted">No hay especialidades registradas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

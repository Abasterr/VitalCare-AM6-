{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 overflow-hidden">
            <div class="card-header text-white text-center py-3" style="background-color: var(--pantone-primary);">
                <h4 class="mb-0"><i class="fa-solid fa-user-shield me-2"></i>Gestión de Usuarios</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <form method="post" novalidate>
                    {% csrf_token %}

                    {% for field in form %}
                    {% if field.name != 'es_administrador' %}
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endif %}
                    {% endfor %}

                    <div class="form-check d-flex align-items-center mb-4 ps-1">
                        {{ form.es_administrador }}
                        <label class="form-check-label fw-bold ms-2 mb-0" for="id_es_administrador"
                            style="color: var(--pantone-secondary); cursor: pointer;">
                            ¿Es un Usuario Administrador?
                        </label>
                    </div>



                    <div class="d-grid gap-2">
                        <button type="submit" class="btn fw-bold shadow-sm"
                            style="background-color: var(--pantone-accent); color: white;">
                            <i class="fa-solid fa-user-plus me-2"></i>Registrar en VitalCare
                        </button>
                        <a href="{% url 'dashboard' %}"
                            class="btn btn-link text-muted text-decoration-none small text-center mt-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

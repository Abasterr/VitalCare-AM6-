{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary">Equipo Médico</h2>
    <a href="{% url 'doctor_create' %}" class="btn btn-primary">Registrar Doctor</a>
</div>
<div class="card border-0 shadow-sm">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr>
                <th>Nombre</th>
                <th>Especialidad</th>
                <th class="text-center">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for doctor in doctores %}
            <tr>
                <td>{{ doctor.nombre }} {{ doctor.apellido }}</td>
                <td><span class="badge bg-info text-dark">{{ doctor.especialidad }}</span></td>
                <td class="text-center">
                    <a href="{% url 'doctor_update' doctor.pk %}" class="btn btn-sm btn-outline-info">Editar</a>
                    <a href="{% url 'doctor_delete' doctor.pk %}" class="btn btn-sm btn-outline-danger">Borrar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
